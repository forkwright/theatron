# cargo-audit configuration.
#
# WHY: cargo-audit does not read deny.toml. This file mirrors the advisory
# ignore list in deny.toml so both tools stay in sync. When adding or
# removing an ignore here, update deny.toml's [[advisories.ignore]]
# entries to match (and vice versa). See standards/CI.md § Vulnerability
# scanning for policy.

[advisories]
ignore = [
    # time 0.3.45 RFC 2822 stack-exhaustion DoS. Transitive via
    # tracing-appender 0.2.5 → bathron, ratatui-widgets 0.3.0 →
    # ratatui/parodos, and mac-notification-sys 0.6.12 → notify-rust →
    # bathron. None of these paths feed untrusted RFC 2822 input to
    # time::format_description, so the DoS vector is unreachable in
    # theatron. Fixed upstream in time 0.3.47; pending transitive bumps.
    "RUSTSEC-2026-0009",
    # atk (gtk-rs GTK3 bindings) unmaintained. Transitive via gtk 0.18.2
    # → muda/tray-icon (notify-rust). GTK3 ecosystem migration to gtk4
    # is upstream-blocked on notify-rust/tray-icon.
    "RUSTSEC-2024-0413",
    # atk-sys (gtk-rs GTK3 bindings) unmaintained. Same GTK3 chain as
    # RUSTSEC-2024-0413.
    "RUSTSEC-2024-0416",
    # gdk (gtk-rs GTK3 bindings) unmaintained. Same GTK3 chain as
    # RUSTSEC-2024-0413.
    "RUSTSEC-2024-0412",
    # gdk-sys (gtk-rs GTK3 bindings) unmaintained. Same GTK3 chain as
    # RUSTSEC-2024-0413.
    "RUSTSEC-2024-0418",
    # gtk (gtk-rs GTK3 bindings) unmaintained. Same GTK3 chain as
    # RUSTSEC-2024-0413.
    "RUSTSEC-2024-0415",
    # gtk-sys (gtk-rs GTK3 bindings) unmaintained. Same GTK3 chain as
    # RUSTSEC-2024-0413.
    "RUSTSEC-2024-0420",
    # gtk3-macros (gtk-rs GTK3 bindings) unmaintained. Same GTK3 chain
    # as RUSTSEC-2024-0413.
    "RUSTSEC-2024-0419",
    # paste unmaintained — transitive via ratatui/dioxus crate chains;
    # no drop-in replacement adopted upstream.
    "RUSTSEC-2024-0436",
    # proc-macro-error unmaintained — transitive via gtk3-macros (GTK3
    # chain). Resolves with GTK4 migration.
    "RUSTSEC-2024-0370",
    # glib VariantStrIter unsoundness. Transitive via GTK3 chain (gtk
    # 0.18.2 → muda/tray-icon → notify-rust). theatron does not call
    # glib::VariantStrIter from any of its crates; vulnerability surface
    # is unreachable. Resolves with GTK4 migration.
    "RUSTSEC-2024-0429",
    # bincode 1.x unmaintained — transitive via dioxus/blitz storage
    # paths; bincode 2.x is a breaking-change rewrite and direct deps
    # have not migrated.
    "RUSTSEC-2025-0141",
]
