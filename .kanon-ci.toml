# archetype:
# forge-only: true
# spdx: Apache-2.0 OR MIT

# Forge CI pipeline for forkwright/theatron.
#
# Mirrors the hardcoded default Rust gate (fmt -> check -> clippy -> nextest
# -> lint) plus a `cargo doc` stage gating the rustdoc surface. The CI
# runner uses a per-run tempdir/target, so every run is a fresh full
# compile of Dioxus + Blitz + wgpu + accesskit, which exceeds the default
# 600/900s budgets at cold cache.
#
# `cargo doc` was added 2026-05-03 because PR #39 promoted `missing_docs`
# from `warn` to `deny` workspace-wide and PR #43 added intra-doc links
# (skeue a11y rustdoc), but neither lint level is fully enforced by the
# clippy stage — cargo doc with RUSTDOCFLAGS="-D warnings" catches:
# - broken intra-doc links (e.g. ``[`launch_cfg_with_props_ext`]`` from
#   PR #38, which kimi A's rustdoc sweep had to fix retroactively)
# - private-item references in pub docs
# - `# Errors` / `# Panics` sections referring to missing variants
# - anything `cargo rustdoc` would warn on but `cargo clippy` doesn't.

[pipeline]
stages = ["cargo fmt", "cargo check", "cargo clippy", "cargo nextest", "cargo doc", "kanon lint"]

[stages."cargo fmt"]
cmd = "cargo fmt --all -- --check"
timeout_secs = 300

[stages."cargo check"]
cmd = "cargo check --workspace --all-targets --jobs 8"
timeout_secs = 1500

[stages."cargo clippy"]
cmd = "cargo clippy --workspace --all-targets --jobs 8 -- -D warnings"
timeout_secs = 1500

[stages."cargo nextest"]
cmd = "cargo nextest run --workspace --build-jobs 8 --test-threads 8"
timeout_secs = 1800

[stages."cargo doc"]
cmd = "env RUSTDOCFLAGS='-D warnings' cargo doc --workspace --no-deps --jobs 8"
timeout_secs = 1500

[stages."kanon lint"]
cmd = "kanon lint . --summary"
timeout_secs = 600

[ci]
release_please = true
crates_publish = false

[ci.toolchain]
channel = "nightly"
components = ["rustfmt", "clippy"]

[ci.security]
has_private_deps = true
run_osv = true
cargo_audit_timeout_minutes = 15

[ci.codeql]
analyze_actions = true
analyze_rust = true

[ci.clippy]
doc_valid_idents = ["OpenAI", "SSE", "HTTP", "HTTPS"]
too_many_arguments_threshold = 10
too_many_lines_threshold = 100

[[ci.clippy.disallowed_methods]]
path = "std::process::exit"
reason = "use snafu errors and propagate; exit() bypasses destructors"

[[ci.clippy.disallowed_types]]
path = "std::sync::Mutex"
reason = "use tokio::sync::Mutex in async code; use parking_lot::Mutex otherwise"

[ci.reusable]
ref = "main"

[[ci.advisories.ignore]]
id = "RUSTSEC-2026-0009"
reason = "time 0.3.45 RFC 2822 stack-exhaustion DoS. Transitive via tracing-appender 0.2.5 → bathron, ratatui-widgets 0.3.0 → ratatui/parodos, and mac-notification-sys 0.6.12 → notify-rust → bathron. None of these paths feed untrusted RFC 2822 input to time::format_description, so the DoS vector is unreachable in theatron. Fixed upstream in time 0.3.47; pending transitive bumps."

[[ci.advisories.ignore]]
id = "RUSTSEC-2024-0413"
reason = "atk (gtk-rs GTK3 bindings) unmaintained. Transitive via gtk 0.18.2 → muda/tray-icon (notify-rust). GTK3 ecosystem migration to gtk4 is upstream-blocked on notify-rust/tray-icon."

[[ci.advisories.ignore]]
id = "RUSTSEC-2024-0416"
reason = "atk-sys (gtk-rs GTK3 bindings) unmaintained. Same GTK3 chain as RUSTSEC-2024-0413."

[[ci.advisories.ignore]]
id = "RUSTSEC-2024-0412"
reason = "gdk (gtk-rs GTK3 bindings) unmaintained. Same GTK3 chain as RUSTSEC-2024-0413."

[[ci.advisories.ignore]]
id = "RUSTSEC-2024-0418"
reason = "gdk-sys (gtk-rs GTK3 bindings) unmaintained. Same GTK3 chain as RUSTSEC-2024-0413."

[[ci.advisories.ignore]]
id = "RUSTSEC-2024-0415"
reason = "gtk (gtk-rs GTK3 bindings) unmaintained. Same GTK3 chain as RUSTSEC-2024-0413."

[[ci.advisories.ignore]]
id = "RUSTSEC-2024-0420"
reason = "gtk-sys (gtk-rs GTK3 bindings) unmaintained. Same GTK3 chain as RUSTSEC-2024-0413."

[[ci.advisories.ignore]]
id = "RUSTSEC-2024-0419"
reason = "gtk3-macros (gtk-rs GTK3 bindings) unmaintained. Same GTK3 chain as RUSTSEC-2024-0413."

[[ci.advisories.ignore]]
id = "RUSTSEC-2024-0436"
reason = "paste unmaintained — transitive via ratatui/dioxus crate chains; no drop-in replacement adopted upstream."

[[ci.advisories.ignore]]
id = "RUSTSEC-2024-0370"
reason = "proc-macro-error unmaintained — transitive via gtk3-macros (GTK3 chain). Resolves with GTK4 migration."

[[ci.advisories.ignore]]
id = "RUSTSEC-2024-0429"
reason = "glib VariantStrIter unsoundness. Transitive via GTK3 chain (gtk 0.18.2 → muda/tray-icon → notify-rust). theatron does not call glib::VariantStrIter from any of its crates; vulnerability surface is unreachable. Resolves with GTK4 migration."

[[ci.advisories.ignore]]
id = "RUSTSEC-2025-0141"
reason = "bincode 1.x unmaintained — transitive via dioxus/blitz storage paths; bincode 2.x is a breaking-change rewrite and direct deps have not migrated."

[[ci.advisories.ignore]]
id = "GHSA-xp3w-r5p5-63rr"
reason = "openssl 0.10.78 UB in X509Ref::ocsp_responders for non-UTF-8 OCSP URLs (CVE-2026-42327). Transitive via native-tls -> reqwest -> blitz-net -> dioxus-native -> mekhane. theatron does not call X509Ref::ocsp_responders; the vector requires parsing attacker-controlled X509 certificates with non-UTF-8 OCSP URLs. Fixed upstream in openssl 0.10.79; pending blitz-net/reqwest pin bump."

[[ci.advisories.ignore]]
id = "GHSA-phqj-4mhp-q6mq"
reason = "openssl 0.10.78 potential OOB write in CipherCtxRef::cipher_update_inplace for AES-KW-PAD ciphers (CVE-2026-45784). Transitive via native-tls -> reqwest -> blitz-net -> dioxus-native -> mekhane. theatron does not use AES key-wrap-with-padding ciphers. Fixed upstream in openssl 0.10.80; pending blitz-net/reqwest pin bump."

[[ci.advisories.ignore]]
id = "GHSA-xv59-967r-8726"
reason = "openssl 0.10.78 heap buffer overflow when encrypting with AES key-wrap-with-padding (CVE-2026-44662). Transitive via native-tls -> reqwest -> blitz-net -> dioxus-native -> mekhane. Same AES-KW-PAD chain as GHSA-phqj-4mhp-q6mq; theatron does not use these cipher modes. Fixed upstream in openssl 0.10.79; pending blitz-net/reqwest pin bump."

[[ci.advisories.ignore]]
id = "GHSA-97wc-2hqc-cjgr"
reason = "smallbitvec 2.6.0 integer overflow in safe API leading to heap buffer overflow (CVE-2026-44983). Transitive via stylo -> blitz-dom -> dioxus-native -> mekhane. theatron does not directly construct SmallBitVec values; the vector requires large attacker-controlled inputs to the CSS layout engine. No fixed version available; pending upstream stylo/blitz-dom migration."

[[ci.advisories.ignore]]
id = "RUSTSEC-2026-0185"
reason = "quinn-proto 0.11.14 remote memory exhaustion from unbounded out-of-order stream reassembly (GHSA-4w2j-m93h-cj5j). Transitive via reqwest 0.13.3 -> blitz-net -> dioxus-native -> mekhane. theatron does not directly control QUIC stream reassembly; the vector requires an adversarial server sending pathological out-of-order stream data. Fixed upstream in quinn-proto 0.11.15; pending reqwest/blitz-net pin bump."

[[ci.advisories.ignore]]
id = "RUSTSEC-2026-0186"
reason = "memmap2 0.9.10 unchecked pointer offset unsoundness. Transitive via fontdb -> usvg -> anyrender_svg/blitz-dom -> dioxus-native -> mekhane. theatron does not directly construct memory maps; the vector requires theatron code to call memmap2 APIs with attacker-controlled offsets, which it does not. Fixed upstream in memmap2 0.9.11; pending fontdb/usvg transitive bump."

[[ci.advisories.ignore]]
id = "RUSTSEC-2026-0192"
reason = "ttf-parser unmaintained — transitive via cosmic-text -> vello_shaders/blitz-dom -> dioxus-native -> mekhane. No maintained fork adopted by upstream; pending blitz-dom/cosmic-text migration."
