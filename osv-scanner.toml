reason = "memmap2 0.9.10 unchecked pointer offset unsoundness. Transitive via fontdb -> usvg -> anyrender_svg/blitz-dom -> dioxus-native -> mekhane. theatron does not directly construct memory maps; the vector requires theatron code to call memmap2 APIs with attacker-controlled offsets, which it does not. Fixed upstream in memmap2 0.9.11; pending fontdb/usvg transitive bump."

