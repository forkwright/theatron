# cargo-deny config for theatron.
#
# Mirrors kanon/deny.toml shape; theatron is dual-licensed Apache-2.0 OR MIT
# so the license allowlist is permissive — every direct dep we accept and
# every transitive accepted by them.

[graph]
targets = []
all-features = false

[advisories]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
    "OpenSSL",
    "BSL-1.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "deny"

# WHY: transitive dependency version splits from different upstream crates.
# Common offenders that don't have unified upstream releases yet.
skip = [
    { crate = "getrandom" },
    { crate = "hashbrown" },
    { crate = "windows-sys" },
    { crate = "thiserror" },
    { crate = "syn" },
]

[sources]
unknown-registry = "deny"
unknown-git = "allow"
