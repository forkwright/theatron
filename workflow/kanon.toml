# LLM proxy for OAuth token lifecycle management and multi-key resilience.
# WHY: Eliminates OAuth token expiry mid-dispatch (#359). The proxy's
# BackgroundRefresher keeps tokens valid continuously. CC sessions pointed
# at the proxy never see auth failures from expired tokens.
# Set via env: KANON_PROVIDER__PROXY_URL, KANON_PROVIDER__PROXY_API_KEY
[provider]
# proxy_api_key -- set via KANON_PROVIDER__PROXY_API_KEY env var (not committed)

[dispatch]
model = "claude-sonnet-4-6"
model_qa = "claude-sonnet-4-6"
# NOTE: `max_parallel` is overridden by the `KANON_DISPATCH_MAX_PARALLEL`
# env var when set; env wins so per-host limits (e.g. verda=4) are not
# accidentally raised by a committed config change.
max_parallel = 10
target_dir = "/data/target"
worktree_base = "/data/worktrees"

[gate]
skip = []
timeout = 300
max_parallel_cargo = 3
jobs_per_process = 0
feature_checks = []
msrv_toolchain = "nightly"
exclude_packages = []

[gate.nightly]
enabled = false
schedule = "0 2 * * *"
mode = "full"

[tooling]
gate_full_tooling_coverage = false
auto_issue_max_per_run = 5
operator_script_dirs = ["~/menos-ops/bin"]

[tooling.cli_only]
commands = []

[tooling.mcp_only]
tools = []

[tooling.script_paths]
paths = []
tracking_issues = {}

[features]
cron_scheduler = false
progress_streaming = false
tool_whitelisting = false
coordinator_fanout = false
microcompaction = false
# Remote feature flag config -- fetched and cached in state_dir.
# Supports file:// and http(s):// URLs (curl must be on $PATH).
# remote_url = "file:///path/to/remote_flags.json"
# remote_ttl_secs = 300

[steward]
ci_mode = "github"
# NOTE: This must match the actual GitHub required status-check contexts for
# the repo the steward is merging into.
required_checks = ["cargo audit", "cargo deny", "gate-attestation"]

[steward.reactions]
fix_ci = true
auto_merge = true
stale_close = false
stale_after_days = 14

[cron]
enabled = false
tick_interval_secs = 60
jitter_percent = 0.10
jitter_max_secs = 900
age_out_days = 7

[cleanup]
worktree_max_age_hours = 48
pid_max_age_hours = 24
prune_target_dir = true
target_dir_max_age_days = 7

# Worktree pool configuration
[worktree]
stale_threshold_secs = 86400

# Triage and deduplication configuration
[triage]
skip_labels = ["wontfix", "duplicate", "question", "invalid"]
blast_radius_threshold = 5
corrective_blast_threshold = 3
directive_min_turns = 5
bus_capacity = 1024

# Affinity scoring weights for dispatch routing
[dispatch.affinity_weights]
crate_weight = 0.4
file_weight = 0.3
project_weight = 0.2

# Fix pipeline configuration
[steward.fix]
ci_poll_timeout_secs = 300
ci_poll_interval_secs = 30
max_concurrent_fixes = 8

# LLM review merge gate (forge#164).
# "stub" (default) -- always approves; "kanon-assist" -- calls localhost:8089.
# Set via env: KANON_LLM_REVIEW_PROVIDER
[llm_review]
provider = "stub"
