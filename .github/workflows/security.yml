name: Security

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "23 11 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  security:
    permissions:
      contents: read
      actions: read
      security-events: write
    uses: forkwright/.github/.github/workflows/security.yml@main

    secrets: inherit

    with:
      has_private_deps: true
      run_osv: true
      cargo_audit_timeout_minutes: 15
