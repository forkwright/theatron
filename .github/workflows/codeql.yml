name: CodeQL

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 14 * * 3"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  codeql:
    permissions:
      security-events: write
      contents: read
      actions: read
    uses: forkwright/.github/.github/workflows/codeql.yml@961f4e0d8ef84ac93303e9fb1ea4123c98b5dab1
    with:
      analyze_actions: true
      analyze_rust: true
      rust_toolchain: "nightly"
