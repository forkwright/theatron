name: No AI Attribution

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  no-ai-attribution:
    uses: forkwright/.github/.github/workflows/no-ai-attribution.yml@961f4e0d8ef84ac93303e9fb1ea4123c98b5dab1
